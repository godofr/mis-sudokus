<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <title>Sudoku Autoajustado - Alineación Fija</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%; 
            width: 100%;
        }

        body {
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: auto; 
            background-color: #f0f0f0;
        }
        
        pre {
            max-width: 98vw; 
            margin: auto; 
            padding: 5px; 
            
            text-align: center;
            border: 2px solid #333;
            border-radius: 8px;
            background-color: white;
            /* La altura de línea uniforme ayuda a la alineación */
            line-height: 1.2; 
        }

        .inner-pre {
            display: block; 
            /* FUENTE MÁS FIABLE: Courier es la más estricta con el espaciado de caracteres */
            font-family: 'Courier New', Courier, monospace; 
            line-height: 1.2;
            font-size: 24px !important; 
            
            /* FUERZA LA ALINEACIÓN EXACTA DE CONSOLA */
            white-space: pre; 
        }

    </style>
</head>
<body>

<pre>
<span class="inner-pre">
 8 2 4 | 3 7 1 | 9 6 5
 9 1 7 | 6 4 5 | 3 2 8
 3 6 5 | 2 8 9 | 1 7 4
-------|-------|-------
 7 3 6 | 1 2 8 | 4 5 9
 2 4 9 | 5 3 7 | 8 1 6
 1 5 8 | 4 9 6 | 2 3 7
-------|-------|-------
 4 7 3 | 8 5 2 | 6 9 1
 6 9 2 | 7 1 4 | 5 8 3
 5 8 1 | 9 6 3 | 7 4 2
</span>
</pre>

</body>
</html>
