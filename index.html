<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: #f0f0f0;
    font-family: sans-serif;
}

.container {
    text-align: center;
    border: 2px solid #333;
    border-radius: 8px;
    background-color: white;
    padding: 20px;
}

a {
    display: block;
    margin: 10px 0;
    font-size: 20px;
    text-decoration: none;
}

h2 {
    margin-top: 25px;
    margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="container">
    <h1>Sudoku diario</h1>

    <h2>🟢 Fácil</h2>
    <a id="facil">🧩 Ver sudoku</a>
    <a id="facil_solucion">✅ Ver solución</a>

    <h2>🟡 Intermedio</h2>
    <a id="intermedio">🧩 Ver sudoku</a>
    <a id="intermedio_solucion">✅ Ver solución</a>

    <h2>🔴 Experto</h2>
    <a id="experto">🧩 Ver sudoku</a>
    <a id="experto_solucion">✅ Ver solución</a>
</div>

<script>
const ts = new Date().getTime();

document.getElementById("facil").href =
  "sudoku-facil.html?v=" + ts;
document.getElementById("facil_solucion").href =
  "sudoku-facil-solucion.html?v=" + ts;

document.getElementById("intermedio").href =
  "sudoku-intermedio.html?v=" + ts;
document.getElementById("intermedio_solucion").href =
  "sudoku-intermedio-solucion.html?v=" + ts;

document.getElementById("experto").href =
  "sudoku-experto.html?v=" + ts;
document.getElementById("experto_solucion").href =
  "sudoku-experto-solucion.html?v=" + ts;
</script>

</body>
</html>
