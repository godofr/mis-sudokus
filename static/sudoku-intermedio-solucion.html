<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <title>Sudoku Autoajustado - Alineación Fija</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%; 
            width: 100%;
        }

        body {
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: auto; 
            background-color: #f0f0f0;
        }
        
        pre {
            max-width: 98vw; 
            margin: auto; 
            padding: 5px; 
            
            text-align: center;
            border: 2px solid #333;
            border-radius: 8px;
            background-color: white;
            /* La altura de línea uniforme ayuda a la alineación */
            line-height: 1.2; 
        }

        .inner-pre {
            display: block; 
            /* FUENTE MÁS FIABLE: Courier es la más estricta con el espaciado de caracteres */
            font-family: 'Courier New', Courier, monospace; 
            line-height: 1.2;
            font-size: 24px !important; 
            
            /* FUERZA LA ALINEACIÓN EXACTA DE CONSOLA */
            white-space: pre; 
        }

    </style>
</head>
<body>

<pre>
<span class="inner-pre">
 8 7 6 | 5 1 4 | 2 3 9
 5 9 2 | 3 7 8 | 1 4 6
 1 3 4 | 2 6 9 | 5 8 7
-------|-------|-------
 2 8 9 | 1 3 5 | 7 6 4
 4 1 7 | 8 2 6 | 9 5 3
 6 5 3 | 4 9 7 | 8 1 2
-------|-------|-------
 7 2 5 | 6 4 1 | 3 9 8
 9 6 8 | 7 5 3 | 4 2 1
 3 4 1 | 9 8 2 | 6 7 5
</span>
</pre>

</body>
</html>
